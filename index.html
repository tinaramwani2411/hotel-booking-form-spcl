<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Booking Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="booking-card">
            <h2 class="hotel-title">Godwin Hotel</h2>
            <p class="subtitle">Luxury Stay Booking</p>

            <form id="bookingForm">

                <!-- Check-in Date -->
                <div class="form-group">
                    <label for="checkin">Check-in Date</label>
                    <input type="date" id="checkin" name="checkin" required>
                </div>

                <!-- Check-out Date -->
                <div class="form-group">
                    <label for="checkout">Check-out Date</label>
                    <input type="date" id="checkout" name="checkout" required>
                </div>

                <!-- Room Type -->
                <div class="form-group">
                    <label for="roomType">Room Type
                    <span class="info" title="Select the type of room based on your comfort preference.">ℹ️</span>
                    </label>
                    <select id="roomType" name="roomType" required>
                        <option value="">-- Select Room Type --</option>
                        <option value="single">Single Room</option>
                        <option value="double">Double Room</option>
                        <option value="suite">Suite</option>
                    </select>
                </div>

                <!-- Guest Count -->
                <div class="form-group">
                    <label for="guests">Number of Guests</label>
                    <input type="number" id="guests" name="guests" min="1" max="10" required>
                </div>

                <!-- Special Requests -->
                <div class="form-group">
                    <label for="requests">
                       Special Requests 
                      <span class="info" title="Mention early check-in, extra bed, airport pickup, etc.">ℹ️</span>
                    </label>
                    <textarea id="requests" name="requests" rows="4" placeholder="Any special requests..."></textarea>
                </div>

                <!-- Submit Button -->
                <div class="form-group">
                    <button type="submit" class="btn">Book Now</button>
                </div>
                <p id="errorMsg" style="text-align:center; margin-top:10px;"></p>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
